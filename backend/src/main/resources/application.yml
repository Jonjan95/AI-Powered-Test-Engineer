spring:
  application:
    name: ai-powered-test-engineer-backend

# Datasource and JPA settings for PostgreSQL (use environment variables in CI/prod)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aipowered}
    username: ${DATABASE_USERNAME:aipower}
    password: ${DATABASE_PASSWORD:123}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
